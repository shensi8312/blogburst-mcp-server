# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - blogburstApiKey
    properties:
      blogburstApiKey:
        type: string
        description: Your BlogBurst API key. Get your free key at https://blogburst.ai/dashboard/api-keys
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'npx', args: ['-y', 'blogburst-mcp-server'], env: { BLOGBURST_API_KEY: config.blogburstApiKey } })
